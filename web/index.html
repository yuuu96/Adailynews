<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#edf2f7">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/styles.css">
  <title>A股情报雷达</title>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand-block">
        <h1>A股情报雷达</h1>
        <div class="meta">
          <span id="dateText">暂无报告</span>
          <span id="aiText">DeepSeek 未运行</span>
        </div>
      </div>
      <div class="actions">
        <button id="runBtn" type="button">一键生成</button>
        <button id="refreshBtn" class="secondary" type="button">刷新最新</button>
        <span class="small" id="countText"></span>
      </div>
      <div class="toast" id="toast"></div>
      <div class="api-row">
        <input id="apiKey" type="password" autocomplete="off" placeholder="DeepSeek API Key（可选，不填则只生成原始报告）">
        <label><input id="saveKey" type="checkbox"> 仅保存在本机浏览器，便于下次使用</label>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
        <div class="small" id="progressText">准备中...</div>
      </div>
    </div>
  </header>

  <main>
    <section class="decision-section" id="decisionBrief"></section>

    <section>
      <div class="section-head">
        <div>
          <h2>九模块情报舱</h2>
          <p>发酵方向、板块异动、材料雷达、突发消息、期指多空、研报、重点产业、A股映射和数据口径。</p>
        </div>
      </div>
      <div class="module-list" id="briefList">
        <div class="digest">点击“一键生成”获取今天的情报模块。</div>
      </div>
    </section>

    <details>
      <summary>AI 投研摘要</summary>
      <div class="digest" id="aiSummary">未生成。</div>
    </details>

    <details>
      <summary>原始聚合摘要</summary>
      <div class="digest" id="rawDigest">暂无数据。</div>
    </details>

    <details>
      <summary>查看结构化 JSON</summary>
      <pre id="jsonDump">{}</pre>
    </details>
  </main>

  <script src="/render.js"></script>
  <script>
    const runBtn = document.getElementById('runBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const toast = document.getElementById('toast');
    const apiKey = document.getElementById('apiKey');
    const saveKey = document.getElementById('saveKey');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const dateText = document.getElementById('dateText');
    const aiText = document.getElementById('aiText');
    const countText = document.getElementById('countText');
    const briefList = document.getElementById('briefList');
    const aiSummary = document.getElementById('aiSummary');
    const rawDigest = document.getElementById('rawDigest');
    const jsonDump = document.getElementById('jsonDump');
    const decisionBrief = document.getElementById('decisionBrief');

    function ensureFrontendFresh() {
      const version = window.IntelUI && window.IntelUI.version;
      if (!version) return;
      const key = 'a_stock_intel_frontend_version';
      const seen = localStorage.getItem(key);
      localStorage.setItem(key, version);
      const params = new URLSearchParams(window.location.search);
      if (seen && seen !== version && params.get('frontend') !== version) {
        params.set('frontend', version);
        window.location.replace(`${window.location.pathname}?${params.toString()}${window.location.hash}`);
      }
    }

    function setToast(text) {
      toast.textContent = text || '';
    }

    function setProgress(value, text) {
      progressWrap.style.display = 'grid';
      progressBar.style.width = `${Math.max(0, Math.min(100, value || 0))}%`;
      progressText.textContent = text || '';
    }

    function hideProgress() {
      progressWrap.style.display = 'none';
      progressBar.style.width = '0%';
      progressText.textContent = '';
    }

    function describeDate(report) {
      const parts = [`${report.date || ''} ${report.generated_at || ''}`.trim()];
      if (report.market_data_cutoff) parts.push(`行情截止 ${report.market_data_cutoff}`);
      return parts.filter(Boolean).join(' · ');
    }

    function render(report) {
      if (!report || report.empty) {
        setToast(report && report.message ? report.message : '');
        return;
      }
      dateText.textContent = describeDate(report);
      aiText.textContent = report.ai_summary ? 'DeepSeek 已生成' : `DeepSeek 未生成：${report.ai_error || '无'}`;
      IntelUI.renderDecisionBrief(report.decision_brief, decisionBrief);
      IntelUI.renderModules(report.brief_sections, briefList);
      aiSummary.textContent = report.ai_summary || `AI 摘要未生成：${report.ai_error || '未知原因'}`;
      rawDigest.textContent = report.raw_digest || '暂无可用数据。';
      const statuses = report.source_status || [];
      countText.textContent = `${statuses.filter(s => s.ok).length}/${statuses.length}`;
      jsonDump.textContent = JSON.stringify(report.sources || report, null, 2);
    }

    async function loadLatest() {
      try {
        refreshBtn.disabled = true;
        const res = await fetch('/api/latest', { cache: 'no-store' });
        render(await res.json());
        setToast('已读取最新报告。');
      } catch (err) {
        setToast(`读取失败：${err.message}`);
      } finally {
        refreshBtn.disabled = false;
      }
    }

    async function runReport() {
      runBtn.disabled = true;
      runBtn.textContent = '生成中...';
      const started = Date.now();
      setProgress(1, '提交任务中...');
      setToast('正在采集数据。');
      if (saveKey.checked && apiKey.value.trim()) {
        localStorage.setItem('deepseek_api_key', apiKey.value.trim());
      } else if (!saveKey.checked) {
        localStorage.removeItem('deepseek_api_key');
      }
      try {
        const res = await fetch('/api/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            deepseek_api_key: apiKey.value.trim(),
            deepseek_model: 'deepseek-v4-pro'
          })
        });
        const startData = await res.json();
        if (!res.ok) throw new Error(startData.error || '启动失败');
        const jobId = startData.job_id;
        let finalReport = null;
        while (!finalReport) {
          await new Promise(resolve => setTimeout(resolve, 1000));
          const jobRes = await fetch(`/api/job/${jobId}`, { cache: 'no-store' });
          const job = await jobRes.json();
          if (!jobRes.ok) throw new Error(job.error || '任务不存在');
          const elapsed = Math.max(1, Math.round((Date.now() - started) / 1000));
          const progress = job.progress || 1;
          const eta = progress > 5 && progress < 100 ? Math.max(1, Math.round(elapsed * (100 - progress) / progress)) : null;
          const etaText = eta ? `，预计还需 ${eta}s` : '';
          setProgress(progress, `${job.current_source || '处理中'} · 已等待 ${elapsed}s${etaText}`);
          if (job.status === 'done') finalReport = job.report;
          if (job.status === 'failed') throw new Error(job.error || '生成失败');
        }
        render(finalReport);
        setToast('已生成最新情报。');
      } catch (err) {
        setToast(`生成失败：${err.message}`);
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = '一键生成';
        setTimeout(hideProgress, 1200);
      }
    }

    const storedKey = localStorage.getItem('deepseek_api_key');
    if (storedKey) {
      apiKey.value = storedKey;
      saveKey.checked = true;
    }
    ensureFrontendFresh();
    runBtn.addEventListener('click', runReport);
    refreshBtn.addEventListener('click', loadLatest);
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    loadLatest();
  </script>
</body>
</html>
