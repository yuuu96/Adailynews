name: Daily A-share Intelligence

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Manual run always generates a fresh report"
        required: false
        default: "true"
  schedule:
    # Beijing 08:56/20:58 = 00:56/12:58 UTC.
    - cron: "56 0 * * *"
    - cron: "58 12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-intel
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas akshare mootdx

      - name: Generate report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: python daily_intel.py

      - name: Build static site
        run: python build_static_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
