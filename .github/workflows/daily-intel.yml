name: Daily A-share Intelligence

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Manual run always generates a fresh report"
        required: false
        default: "true"
  schedule:
    # Beijing 08:56/18:58 = 00:56/10:58 UTC.
    - cron: "56 0 * * *"
    - cron: "58 10 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-intel
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas akshare mootdx

      - name: Generate report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: python daily_intel.py

      - name: Persist sector radar history
        if: github.ref == 'refs/heads/main'
        run: |
          if [ ! -f reports/sector_radar/history.jsonl ]; then
            echo "No sector radar history generated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/sector_radar/history.jsonl
          if git diff --cached --quiet; then
            echo "No sector radar history changes."
            exit 0
          fi
          git commit -m "Update sector radar history [skip ci]"
          git pull --rebase --autostash origin main
          git push origin HEAD:main

      - name: Build static site
        run: python build_static_site.py

      - name: Verify built report freshness
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("site/latest.json").read_text(encoding="utf-8"))
          metadata = json.loads(Path("site/metadata.json").read_text(encoding="utf-8"))
          print("report date:", data.get("date"))
          print("generated_at:", data.get("generated_at"))
          print("market_data_cutoff:", data.get("market_data_cutoff"))
          print("metadata report_url:", metadata.get("report_url"))
          for section in data.get("brief_sections", []):
              if section.get("type") == "equity_map":
                  for group in section.get("groups", []):
                      if group.get("name") == "数据中心电力液冷":
                          for stock in group.get("stocks", [])[:8]:
                              print(
                                  "quote",
                                  stock.get("code"),
                                  stock.get("name"),
                                  stock.get("change_pct"),
                                  stock.get("quote_date"),
                                  stock.get("quote_source"),
                              )
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
