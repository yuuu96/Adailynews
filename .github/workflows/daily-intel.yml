name: Daily A-share Intelligence

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if it is not 09:00/21:00 in Beijing"
        required: false
        default: "true"
  schedule:
    # Beijing 09:00/21:00 = 01:00/13:00 UTC.
    - cron: "0 1,13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-intel
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Beijing 09:00/21:00
        id: timecheck
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour=$(TZ=Asia/Shanghai date +%H)
          if [ "$hour" = "09" ] || [ "$hour" = "21" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when not target time
        if: steps.timecheck.outputs.should_run != 'true'
        run: echo "Not 09:00/21:00 Asia/Shanghai; skipping."

      - name: Setup Python
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Pages
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Install dependencies
        if: steps.timecheck.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas akshare mootdx

      - name: Generate report
        if: steps.timecheck.outputs.should_run == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: python daily_intel.py

      - name: Build static site
        if: steps.timecheck.outputs.should_run == 'true'
        run: python build_static_site.py

      - name: Upload Pages artifact
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.timecheck.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
